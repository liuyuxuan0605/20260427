{% extends "base.html" %}
{% block title %}注册 - 音乐推荐播放器{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>注册</h2>
        <form id="registerForm" onsubmit="return handleRegister(event)">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" required placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" required placeholder="请输入用户名" minlength="2" maxlength="20">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required placeholder="至少6位" minlength="6">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirm_password" required placeholder="再次输入密码">
            </div>
            <button type="submit" class="btn-primary btn-block">注册</button>
        </form>
        <div class="auth-footer">
            已有账号？<a href="/login">去登录</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function handleRegister(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const confirm_password = document.getElementById('confirm_password').value;
    
    if (password !== confirm_password) {
        showToast('两次密码不一致', 'error');
        return false;
    }
    
    try {
        const resp = await fetch('/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, username, password, confirm_password})
        });
        const data = await resp.json();
        if (data.code === '200') {
            showToast('注册成功！', 'success');
            setTimeout(() => window.location.href = '/', 500);
        } else {
            showToast(data.message, 'error');
        }
    } catch (err) {
        showToast('网络错误，请重试', 'error');
    }
    return false;
}
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}登录 - 音乐推荐播放器{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>登录</h2>
        <div id="loginHint" class="auth-hint" style="display:none;">
            ⚠️ 登录后才能使用收藏功能
        </div>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" required placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn-primary btn-block">登录</button>
        </form>
        <div class="auth-footer">
            还没有账号？<a href="/register">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 检查是否有 next 参数（从收藏跳转来的）
const urlParams = new URLSearchParams(window.location.search);
const nextUrl = urlParams.get('next');
if (nextUrl) {
    document.getElementById('loginHint').style.display = 'block';
}

async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    try {
        const resp = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });
        const data = await resp.json();
        if (data.code === '200') {
            showToast('登录成功！', 'success');
            // 如果有 next 参数，跳转回去
            if (nextUrl) {
                setTimeout(() => window.location.href = nextUrl, 500);
            } else {
                setTimeout(() => window.location.href = '/', 500);
            }
        } else {
            showToast(data.message, 'error');
        }
    } catch (err) {
        showToast('网络错误，请重试', 'error');
    }
    return false;
}
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}音乐推荐播放器{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">🎵 音乐推荐播放器</a>
            <button class="nav-toggle" id="navToggle" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="/" class="nav-link">首页</a></li>
                <li><a href="/songs" class="nav-link">音乐库</a></li>
                <li><a href="/about" class="nav-link">关于</a></li>
                <li id="authArea">
                    <!-- 由 JS 动态填充 -->
                </li>
            </ul>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- 底部播放器 -->
    <div class="player-bar" id="playerBar">
        <div class="player-song-info">
            <img class="player-cover" id="playerCover" src="/static/img/default-cover.svg" alt="封面">
            <div class="player-text">
                <div class="player-name" id="playerName">未在播放</div>
                <div class="player-artist" id="playerArtist">选择一首歌曲开始</div>
            </div>
            <button class="btn-heart" id="btnHeart" title="喜欢" onclick="toggleFavoriteFromPlayer()">♡</button>
        </div>
        <div class="player-volume" id="playerVolume">
            <button class="ctrl-btn volume-icon" id="btnVolume" title="音量">🔊</button>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
            <span class="volume-pct" id="volumePct">100%</span>
        </div>
        <div class="player-controls">
            <button class="ctrl-btn" id="btnPrev" title="上一曲">⏮</button>
            <button class="ctrl-btn ctrl-play" id="btnPlay" title="播放/暂停">▶</button>
            <button class="ctrl-btn" id="btnNext" title="下一曲">⏭</button>
        </div>
        <div class="player-progress">
            <span class="time-label" id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time-label" id="totalTime">0:00</span>
        </div>
        <div class="player-extra">
            <button class="ctrl-btn" id="btnLyric" title="歌词">词</button>
        </div>
    </div>

    <!-- 歌词浮窗 -->
    <div class="lyric-panel hidden" id="lyricPanel">
        <div class="lyric-header">
            <span>歌词</span>
            <button class="lyric-close" id="lyricClose">✕</button>
        </div>
        <div class="lyric-body" id="lyricBody">
            <p class="lyric-line">暂无歌词</p>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="site-footer">
        <p>© 2026 音乐推荐播放器 | 数据来源：QQ音乐 · 网易云 · 酷狗 · 酷我</p>
    </footer>

    <!-- 隐藏 Audio 元素 -->
    <audio id="audioPlayer" preload="auto"></audio>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/player.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
